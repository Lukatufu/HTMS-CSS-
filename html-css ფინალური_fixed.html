        const correctAnswers = [
            1,0,3,0,1,3,2,1,0,3,0,0,2,3,2,2,2,1,3,1,1,0,1,1,1,0,2,2,2,0,1,0,2,1,2,0,0,0,3,3,3,0,0,2,2,1,1,0,1,3,0,0,0,0,0,2,1,3,1,2,1,0,1,1,0,2,1,3,1,0,0,1,0,1,0,0,2,3,1,2,1,0,0,3,2,3,0,2,2,2,3,2,2,3,1,3,1,0,0,1,2,2,0,1,3,3,0,3,1,0,2,0,1,2,1,0,1,2,0,0,3,3,2,1,2,0,2,2,2,0,0,1,1,2,3,0,2,3,2,3,0,1,1,0,0,3,1,3,2,2,1,1,1,2,0,0,1,3,2,3
        ];

        const container = document.getElementById("quiz-container");
        const lines = rawQuizData.trim().split("\n");

        lines.forEach((line, qIndex) => {
            const parts = line.split("|");
            const div = document.createElement("div");
            div.className = "question-card";
            const q = document.createElement("div");
            q.textContent = parts[0];
            div.appendChild(q);
            
            const ul = document.createElement("ul");
            ul.className = "options";
            
            for(let i=1; i<parts.length; i++) {
                const li = document.createElement("li");
                const label = document.createElement("label");
                const radio = document.createElement("input");
                radio.type = "radio";
                radio.name = `q${qIndex}`;
                radio.value = i-1;
                
                label.appendChild(radio);
                label.appendChild(document.createTextNode(parts[i]));
                
                label.onclick = function(event) {
                    event.preventDefault(); // აქ დავამატეთ გადამისამართების ბლოკირება
                    const inputs = div.querySelectorAll('input');
                    inputs.forEach(inp => inp.disabled = true);
                    
                    if((i-1) === correctAnswers[qIndex]) {
                        label.classList.add('correct');
                    } else {
                        label.classList.add('incorrect');
                        div.querySelectorAll('label')[correctAnswers[qIndex]].classList.add('correct');
                    }
                };
                li.appendChild(label);
                ul.appendChild(li);
            }
            div.appendChild(ul);
            container.appendChild(div);
        });
    </script>
